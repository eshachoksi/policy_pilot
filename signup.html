<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - PolicyPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" style="text-decoration: none; color: inherit; display: inline-block;">
                <img src="logo.png" alt="PolicyPilot Logo" style="height: 140px; object-fit: contain; filter: invert(1) brightness(1.1) contrast(1.2); mix-blend-mode: screen;">
            </a>
            <p style="color: var(--text-muted); margin-top: 1rem;">Create an account to track your government schemes.</p>
        </div>

        <!-- Sign Up Form -->
        <div class="glass-panel" style="padding: 2.5rem;">
            <form id="signupForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div style="position: relative;">
                        <i class="ph ph-user" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted); font-size: 20px;"></i>
                        <input type="text" id="signupName" class="form-control" placeholder="Aarav Sharma" style="padding-left: 44px;" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div style="position: relative;">
                        <i class="ph ph-envelope" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted); font-size: 20px;"></i>
                        <input type="email" id="signupEmail" class="form-control" placeholder="citizen@india.gov.in" style="padding-left: 44px;" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <i class="ph ph-lock-key" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted); font-size: 20px;"></i>
                        <input type="password" class="form-control" placeholder="Create a strong password" style="padding-left: 44px;" required>
                    </div>
                </div>

                <div class="form-group" style="display: flex; gap: 10px; align-items: flex-start; margin-top: 1rem;">
                    <input type="checkbox" id="terms" required style="margin-top: 4px; accent-color: var(--accent-primary);">
                    <label for="terms" style="font-size: 0.85rem; color: var(--text-muted); font-weight: 400; margin: 0;">
                        I agree to the <a href="#" style="color: var(--accent-primary);">Terms of Service</a> and <a href="#" style="color: var(--accent-primary);">Privacy Policy</a>.
                    </label>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1.5rem; padding: 14px;">
                    Create Account <i class="ph ph-user-plus" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Already have an account? <a href="login.html" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Sign In here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            localStorage.setItem('policyPilotUser', JSON.stringify({ email: email, name: name }));
            window.location.href = 'index.html?signup_success=true';
        });
    </script>
</body>
</html>
