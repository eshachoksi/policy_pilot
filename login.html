<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - PolicyPilot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="auth-page">
    <div class="auth-container">
        <!-- Logo -->
        <div style="text-align: center; margin-bottom: 2rem;">
            <a href="index.html" style="text-decoration: none; color: inherit; display: inline-block;">
                <img src="logo.png" alt="PolicyPilot Logo" style="height: 140px; object-fit: contain; filter: invert(1) brightness(1.1) contrast(1.2); mix-blend-mode: screen;">
            </a>
            <p style="color: var(--text-muted); margin-top: 1rem;">Welcome back! Log in to continue.</p>
        </div>

        <!-- Login Form -->
        <div class="glass-panel" style="padding: 2.5rem;">
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <div style="position: relative;">
                        <i class="ph ph-envelope" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted); font-size: 20px;"></i>
                        <input type="email" id="loginEmail" class="form-control" placeholder="citizen@india.gov.in" style="padding-left: 44px;" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <i class="ph ph-lock-key" style="position: absolute; left: 14px; top: 14px; color: var(--text-muted); font-size: 20px;"></i>
                        <input type="password" class="form-control" placeholder="••••••••" style="padding-left: 44px;" required>
                    </div>
                    <div style="text-align: right; margin-top: 8px;">
                        <a href="#" style="color: var(--accent-primary); font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 1rem; padding: 14px;">
                    Sign In <i class="ph ph-sign-in" style="margin-left: 8px;"></i>
                </button>
            </form>

            <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-muted);">
                Don't have an account? <a href="signup.html" style="color: var(--accent-primary); font-weight: 600; text-decoration: none;">Sign Up here</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            localStorage.setItem('policyPilotUser', JSON.stringify({ email: email, name: email.split('@')[0] }));
            window.location.href = 'index.html?login_success=true';
        });
    </script>
</body>
</html>
